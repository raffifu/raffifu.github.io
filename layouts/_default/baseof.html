<!DOCTYPE html>
<html lang="{{ .Params.lang | default "id" }}">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
        <meta name="author" content="{{ .Site.Params.author }}" />
        <meta name="robots" content="index, follow" />
        <link rel="canonical" href="{{ .Permalink }}" />
        <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="/index.xml" />

        <meta name="theme-color" content="#212529">
        <meta name="msapplication-navbutton-color" content="#212529">
        <meta name="apple-mobile-web-app-status-bar-style" content="#212529">

        <meta property="og:title" content="{{ if .IsHome }}/home/raffifu/blog{{ else }}{{ .Title }}{{ end }}" />
        <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
        <meta property="og:url" content="{{ .Permalink }}" />
        <meta property="og:image" content="{{ if .Params.image }}{{ .Params.image | absURL }}{{ else }}{{ .Site.Params.image | absURL }}{{ end }}">
        <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
        <meta property="og:locale" content="id_ID" />
        <meta property="og:locale:alternate" content="en_US" />
        <meta property="og:site_name" content="{{ .Site.Title }}" />
        {{ if .IsPage }}
        <meta property="article:published_time" content="{{ .PublishDate.Format "2006-01-02T15:04:05Z07:00" }}" />
        <meta property="article:modified_time" content="{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}" />
        {{ range .Params.tags }}
        <meta property="article:tag" content="{{ . }}" />
        {{ end }}
        {{ end }}

        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:site" content="@raffifuu">
        <meta name="twitter:title" content="{{ if .IsHome }}/home/raffifu/blog{{ else }}{{ .Title }}{{ end }}">
        <meta name="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}" >
        <meta name="twitter:image" content="{{ if .Params.image }}{{ .Params.image | absURL }}{{ else }}{{ .Site.Params.image | absURL }}{{ end }}">

        <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.1.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css" />
        <!-- Highlight.js Theme -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
        <!-- Replace the old Bootstrap 5.1.3 link / core theme CSS -->
        <link href="/css/styles.css?v={{ now.UnixNano }}" rel="stylesheet" />
        <link href="/css/custom.css?v={{ now.UnixNano }}" rel="stylesheet" />
        <!-- Add this inline script right before </head> -->
        <script>
          (function() {
            try {
              const savedTheme = localStorage.getItem('theme') || 'dark';
              document.documentElement.setAttribute('data-bs-theme', savedTheme);
              
              const savedFont = localStorage.getItem('fontFamily');
              if (savedFont) {
                  document.documentElement.style.setProperty('--bs-body-font-family', savedFont);
              }
              
              const savedSize = localStorage.getItem('fontSize');
              if (savedSize) {
                  document.documentElement.style.setProperty('--bs-body-font-size', savedSize + 'rem');
              }
              
              const savedWidth = localStorage.getItem('contentWidth');
              if (savedWidth) {
                  document.documentElement.style.setProperty('--bs-content-width', savedWidth + 'px');
              }
            } catch (e) {
              console.warn('localStorage is not available');
            }
          })();
        </script>
    </head>
    <body>
        <a href="#mainContent" class="skip-link" tabindex="1">Skip to main content</a>

        {{ partial "header.html" . }}
        <!-- Main Content-->
        <main class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7" id="mainContent">
                    {{ block "main" . }}{{ end }}
                </div>
            </div>
        </main>
        {{ if ne .Kind "404" }}
        {{ partial "footer.html" . }}
        {{ end }}
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="/js/scripts.js?v={{ now.UnixNano }}"></script>
    </body>
</html>
